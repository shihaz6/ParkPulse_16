storage.path=data/
jwt.secret=9a4f2c8d3e1b7f6a5c4d3e2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a21

# Load .env file from project root (supports GEMINI_API_KEY and MySQL overrides)
spring.config.import=optional:file:.env[.properties]

# ===================================================================================
# ACTIVE PROFILE CONFIGURATION
# ===================================================================================
# Uncomment the line below to use MySQL instead of H2 (in-memory/file) database.
# Make sure you have created the database and user in MySQL first.
# See application-mysql.properties for the full MySQL configuration.
#
spring.profiles.active=mysql
#
# Alternatively, you can set the environment variable:
#   SPRING_PROFILES_ACTIVE=mysql
# Or pass it as a command line argument:
#   java -jar -Dspring.profiles.active=mysql <app.jar>
# ===================================================================================

# --- Default Configuration: H2 File-based SQL Database (Development) ---
# Database Configuration (H2 File-based SQL Database)
spring.datasource.url=jdbc:h2:file:./data/db/parkpulsedb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console Configuration (available at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
