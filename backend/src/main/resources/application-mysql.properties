# MySQL Configuration Profile for ParkPulse Backend
# ===================================================================================
# Usage: Activate this profile by setting the Spring profile:
#        spring.profiles.active=mysql
#        OR run with: java -jar -Dspring.profiles.active=mysql <app.jar>
#        OR use the Maven profile: mvn spring-boot:run -Dspring-boot.run.profiles=mysql
# ===================================================================================

server.port=8080
storage.path=data/
jwt.secret=9a4f2c8d3e1b7f6a5c4d3e2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6d5c4b3a21

# Database Configuration (MySQL)
# ===================================================================================
# NOTE: Create a database named 'parkpulsedb' in MySQL before running the application.
#       Also create a user with the appropriate permissions.
# Example SQL:
#   CREATE DATABASE parkpulsedb CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
#   CREATE USER 'parkpulse_user'@'localhost' IDENTIFIED BY 'your_strong_password';
#   GRANT ALL PRIVILEGES ON parkpulsedb.* TO 'parkpulse_user'@'localhost';
#   FLUSH PRIVILEGES;
# ===================================================================================

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/parkpulsedb?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USER:parkpulse_user}
spring.datasource.password=${MYSQL_PASSWORD:shihaz#1}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection Pooling (HikariCP)
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# AI Provider Configuration (OpenAI-compatible format)
ai.endpoint=https://api.groq.com/openai/v1/chat/completions
ai.model=llama-3.3-70b-versatile
ai.api.key=${AI_API_KEY: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}
